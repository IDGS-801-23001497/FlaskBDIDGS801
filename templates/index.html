{% extends "layout.html" %}
{% block container %}

<div class="py-20 px-4 max-w-4xl mx-auto">
    <div class="mb-12">
        <h1 class="text-5xl md:text-6xl font-black text-slate-800 tracking-tight">
            Bienvenido, <span class="text-blue-600">eres:</span>
        </h1>
        <p class="text-slate-500 mt-4 text-lg">Selecciona tu perfil para continuar al sistema.</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <a href="{{ url_for('alumnos.listado_alumnos') }}" class="group relative flex items-center p-8 bg-white border border-slate-200 rounded-3xl shadow-sm hover:shadow-xl hover:border-blue-500 transition-all duration-300">
            <div class="bg-blue-100 text-blue-600 p-4 rounded-2xl group-hover:bg-blue-600 group-hover:text-white transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-8">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4.26 10.147L12 15l7.74-4.853a1.125 1.125 0 000-1.906L12 3.393a1.125 1.125 0 000 1.906z" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M21 12.75l-9 5.25-9-5.25m18-3.5l-9 5.25-9-5.25" />
                </svg>
            </div>
            <div class="ml-6">
                <h3 class="text-2xl font-bold text-slate-800">Alumnos</h3>
            </div>
        </a>

        <a href="{{ url_for('maestros.listado_maestros') }}" class="group relative flex items-center p-8 bg-white border border-slate-200 rounded-3xl shadow-sm hover:shadow-xl hover:border-indigo-500 transition-all duration-300">
            <div class="bg-indigo-100 text-indigo-600 p-4 rounded-2xl group-hover:bg-indigo-600 group-hover:text-white transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-8">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 7.5h1.5m-1.5 3h1.5m-7.5 3h7.5m-7.5 3h7.5m3-9h3.375c.621 0 1.125.504 1.125 1.125V18a2.25 2.25 0 01-2.25 2.25M16.5 7.5V18a2.25 2.25 0 002.25 2.25M16.5 7.5V4.875c0-.621-.504-1.125-1.125-1.125H4.125C3.504 3.75 3 4.254 3 4.875V18a2.25 2.25 0 002.25 2.25h13.5M6 7.5h3v3H6v-3z" />
                </svg>
            </div>
            <div class="ml-6">
                <h3 class="text-2xl font-bold text-slate-800">Maestros</h3>
            </div>
        </a>
    </div>
</div>

{% endblock %}
